name: Build and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'version.txt'   # only build + release when the version file is bumped

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Read version ────────────────────────────────────────────────────────
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(tr -d '[:space:]' < version.txt)
          if [ -z "$VERSION" ]; then
            echo "::error::version.txt is empty"
            exit 1
          fi
          echo "version=$VERSION"    >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"       >> "$GITHUB_OUTPUT"

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install PyQt5 pyinstaller pynput mss numpy opencv-python-headless

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GorgonSurveyTracker
          --add-data "version.txt;."
          survey_tracker.py

      # ── Publish ─────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GorgonSurveyTracker ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          make_latest: true
          files: dist/GorgonSurveyTracker.exe
